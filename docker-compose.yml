version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Basic n8n config
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/

      # Security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=change-this-password

      # Your API keys (loaded from .env file)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SMARTLEAD_API_KEY=${SMARTLEAD_API_KEY}

      # Timezone
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York

    volumes:
      # Persist workflows and credentials
      - ./n8n_data:/home/node/.n8n

    env_file:
      - .env  # Load additional secrets from .env

